services:
  - type: web
    runtime: node
    plan: free
    name: peopleflow-hrms
    buildCommand: "npm ci --prefix server && npm ci --prefix client --include=dev && npm run build --prefix client"
    startCommand: "npm start --prefix server"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.22.0
      - key: CLIENT_URL
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: REFRESH_COOKIE_NAME
        value: hrms_refresh_token
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_DEMO_DATA
        value: "false"
